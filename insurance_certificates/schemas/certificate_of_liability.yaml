name: certificate_of_liability
description: |
  Certificate of liability insurance extraction. Pulls certificate
  metadata (producer, insured, certificate holder) plus a list of
  policies. Each policy is a logical entity whose fields may be
  spread across multiple sections of the document — the coverage
  grid lists some fields, detailed limit sections list others, and
  endorsement pages may reference specific policies by policy number.

  The extraction target is the RECONCILED result: one entry per
  unique policy_number with all fields collated from wherever they
  appeared in the document.

apply_to: [coi]

categories:
  keywords:
    header: ["certificate", "liability insurance", "proof of insurance", "coverage"]
    producer: ["producer", "agency", "broker", "insurance agent", "contact"]
    insured: ["insured", "named insured", "policyholder"]
    coverage_summary: ["coverage summary", "coverage grid", "policies in force", "coverage overview"]
    coverage_detail: ["coverage detail", "limit detail", "policy detail", "detailed limits"]
    certificate_holder: ["certificate holder", "additional insured", "cancellation"]
    remarks: ["remarks", "additional information", "endorsements", "schedule"]

signals:
  has_policy_numbers:
    pattern: "[A-Z]{2,6}[\\s-]?\\d{5,}"
  has_phone_numbers:
    pattern: "\\(?\\d{3}\\)?[\\s.-]?\\d{3}[\\s.-]?\\d{4}"
  has_limit_amounts:
    pattern: "\\$[\\d,]+(?:,000)?(?:\\.\\d{2})?"

fields:
  certificate_date:
    type: date
    required: true
    description: Date the certificate was issued
    hints:
      look_in: [header]
      patterns: ["(?:date|issued)[:\\s]"]
      signals: [has_dates]

  producer_name:
    type: string
    required: true
    description: |
      Name of the producer / broker / agency issuing the certificate.
      This is the insurance agent or brokerage, not the insured party
      or the insurer.
    hints:
      look_in: [producer]
      patterns: ["producer", "agency", "broker"]

  producer_phone:
    type: string
    description: Producer's contact phone number
    hints:
      look_in: [producer]
      signals: [has_phone_numbers]

  insured_name:
    type: string
    required: true
    description: |
      Name of the insured party (the policyholder). This is the
      entity whose policies are described in the certificate.
    hints:
      look_in: [insured]
      patterns: ["insured"]

  certificate_holder_name:
    type: string
    required: true
    description: |
      Name of the certificate holder — the party requesting proof
      of insurance. Typically appears in a labeled box.
    hints:
      look_in: [certificate_holder]
      patterns: ["certificate\\s*holder"]

  policies:
    type: array
    description: |
      List of insurance policies on the certificate. Each policy may
      have data spread across multiple sections of the document:
      the coverage summary (grid), detailed limit sections, and any
      remarks or endorsement pages.

      CRITICAL: Collate all information per unique policy_number
      into a single entry. When the same policy_number appears in
      multiple sections with different fields populated, merge them.
      Do not return duplicate entries for the same policy.

      Carrier name resolution: many certificates use letter codes
      (A, B, C) in the coverage grid to reference an insurer list
      elsewhere in the document (e.g., "Insurer A: Evergreen Mutual").
      Always return the full company name — dereference the letter
      code against the insurer list. Never return just "A" or "B".

      Limits: each policy has a list of named limits with amounts.
      The names vary by coverage type — use the exact label shown in
      the document (e.g., "Each Occurrence", "General Aggregate",
      "Combined Single Limit (Each Accident)", "Bodily Injury by
      Accident"). Do not force limit names into fixed categories.

      Additional insureds: if an Additional Insureds section, Remarks
      section, or endorsement schedule references specific policy
      numbers, collect the parties named as additional insured on
      each referenced policy into that policy's additional_insureds
      list. If a policy is not mentioned in any endorsement section,
      its additional_insureds list is empty.
    items:
      type: object
      properties:
        policy_number:
          type: string
        coverage_type:
          type: string
        carrier_name:
          type: string
        effective_date:
          type: date
        expiration_date:
          type: date
        limits:
          type: array
          description: Named limits with amounts, labeled as shown in the document
          items:
            type: object
            properties:
              name:
                type: string
              amount:
                type: number
        additional_insureds:
          type: array
          items:
            type: string
    hints:
      look_in: [coverage_summary, coverage_detail, remarks, header]
      signals: [has_policy_numbers, has_limit_amounts, has_dates]
      patterns: ["general\\s*liability", "auto\\s*liability", "workers\\s*compensation", "umbrella", "excess\\s*liability"]
      max_chunks: 12  # policy data is spread across many detail chunks
