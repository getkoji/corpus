name: filing_metadata
description: Metadata extractable from the body of an SEC filing — filer, form type, dates

# Schema scope: only fields a general-purpose extractor could reasonably find
# in the document text itself. EDGAR-internal identifiers (CIK, accession
# number) live in EDGAR's index, not in the filing body, so they are out of
# scope here. Anyone who needs them should pull them from the EDGAR index
# directly and feed the document to koji separately. See accuracy-1 PR for
# the full reasoning.

categories:
  keywords:
    # ORDER MATTERS: the classifier iterates categories and returns on the
    # first match. Signatures must come before header because the header
    # keyword list is broad ("securities", "exchange") and those words also
    # appear in signature blocks — if header is checked first, signature
    # chunks get misclassified as header.
    #
    # Narrow signatures-block category for routing the filing_date field
    # specifically. Real SEC filings put the filing date next to officer
    # signatures on the signature page; these phrases are boilerplate
    # that appears in nearly every signature block.
    signatures:
      - "duly authorized"
      - "by the undersigned"
      - "pursuant to the requirements of section 13"
    # Mix of metadata-label keywords (for synthetic / hand-crafted samples) and
    # cover-page boilerplate keywords (for real EDGAR filings parsed via docling).
    # Real SEC cover pages reliably contain "exchange commission", "exchange act",
    # "registrant", "commission file", "incorporation", "employer identification";
    # the first set covers the synthetic stub format.
    header: [
      "form",
      "filer",
      "filing date",
      "period of report",
      "registrant",
      "exchange commission",
      "exchange act",
      "commission file",
      "securities",
      "incorporation",
      "employer identification",
    ]

fields:
  filer_name:
    type: string
    required: true
    description: Name of the company or individual filing the document
    extraction_hint: |
      Return the FULL registrant name as shown on the cover page,
      immediately above "(Exact name of registrant as specified in its
      charter)". The name is sometimes split across multiple consecutive
      bold lines in the parsed markdown (e.g. "**America**" on one line
      and "**Great Health**" on the next) — in that case combine the
      lines into the single full name ("America Great Health"). Do not
      return only the last bold fragment.
    hints:
      look_in: [header]
      patterns: ["filer[:\\s]", "(?:company|issuer)\\s*name", "registrant"]
      signals: [has_name_references]

  form_type:
    type: enum
    required: true
    description: SEC form type (e.g., 10-K, 10-Q, 8-K)
    extraction_hint: |
      Use the full form identifier as printed on the cover page, including
      any amendment suffix. If the cover page shows "FORM 10-K/A", return
      "10-K/A", not "10-K" — the "/A" suffix is significant and must not
      be dropped. Amendment indicators ("Amendment No. 1", "Amendment No.
      3") near the form header confirm the /A suffix is correct.
    options:
      - 10-K
      - 10-K/A
      - 10-Q
      - 10-Q/A
      - 8-K
      - 8-K/A
      - S-1
      - S-1/A
      - DEF 14A
      - 20-F
      - 6-K
      - 3
      - 4
      - 5
      - 13F-HR
      - SC 13G
      - SC 13D
      - Other
    hints:
      look_in: [header]
      patterns: ["form\\s*(?:type)?[:\\s]*(?:10-?[KQ]|8-?K|S-?1|DEF\\s*14A)"]

  filing_date:
    type: date
    required: true
    description: Date this document was filed with the SEC (signature page).
    extraction_hint: |
      Use the date next to the officer signatures in the signature block
      ("Dated: Month DD, YYYY" next to "/s/ Officer Name", or "on the Xth
      day of Month YYYY" in the preamble to the signature block).

      Do NOT use:
        - "As of Month DD, YYYY" share-count or record-holder dates
        - "filed on Month DD, YYYY" references in the EXPLANATORY NOTE of
          an amendment — that is the ORIGINAL filing's date, not this
          amendment's. For 10-K/A and 10-Q/A filings, the filing date is
          the date the amendment was signed, which appears in the
          signature block near the bottom of the document.
        - Auditor signing dates in the financial statements
          ("/s/ [Accounting Firm]  Month DD, YYYY")
        - "Date of Report" on 8-K cover pages (that is the event date,
          see period_of_report instead)
    hints:
      look_in: [signatures, header]
      # Phrases that identify the officer signature block. Scores +12 when
      # matched, which is enough to beat body chunks that only trigger
      # pattern matches (+8). See koji router.py scoring pipeline.
      prefer_contains:
        - "/s/"
        - "Dated:"
        - "duly authorized"
        - "by the undersigned"
        - "SIGNATURES"
      patterns: ["filing\\s*date", "filed\\s*(?:on|as\\s*of)", "date[:\\s]"]
      signals: [has_dates]

  # The old single `period_of_report` field tried to mean different things
  # per form type (fiscal year end for 10-K, quarter end for 10-Q, event
  # date for 8-K, meeting date for DEF 14A). Each form populates only the
  # relevant one of the four fields below; the others should be null.
  # See accuracy-6 PR for the rationale — cleaner semantics, zero engine
  # work, better per-form prompting.

  period_fiscal_year_end:
    type: date
    description: Fiscal year-end date for 10-K / 10-K/A filings.
    extraction_hint: |
      For 10-K and 10-K/A filings only. Extract the fiscal year-end date
      referenced near "For the fiscal year ended" on the cover page.
      The label may be line-broken in parsed markdown (e.g. "For the\n\n
      fiscal year ended\n\nDecember 31, 2025") — return the date no
      matter how the label is broken up.

      For amendments (10-K/A), the period_fiscal_year_end is the SAME
      period the original 10-K covered — it typically appears both on
      the cover header AND inside the EXPLANATORY NOTE ("amends our
      Annual Report on Form 10-K for the fiscal year ended December
      31, 2025"). Use either reference.

      Return null for any non-10-K form type.
    hints:
      look_in: [header]
      patterns: ["fiscal\\s*year\\s*ended", "year\\s*ended", "for\\s*the\\s*fiscal\\s*year"]
      signals: [has_dates]

  period_quarter_end:
    type: date
    description: Quarter-end date for 10-Q / 10-Q/A filings.
    extraction_hint: |
      For 10-Q and 10-Q/A filings only. Extract the quarter-end date
      referenced near "For the quarterly period ended" on the cover page.
      The label is often line-broken in parsed markdown ("For the\n\n
      quarterly\n\nperiod ended\n\nDecember 31, 2025") — treat the date
      adjacent to the broken-up label as the answer.

      If the cover page shows multiple quarter-end dates (e.g. comparison
      periods in financial-statement headers), pick the MOST RECENT one
      — that is the period the filing reports on. Comparison periods
      like "three months ended September 30, 2025" from the prior year
      are not the answer.

      Return null for any non-10-Q form type.
    hints:
      look_in: [header]
      patterns: ["quarterly\\s*period\\s*ended", "quarter\\s*ended", "for\\s*the\\s*(?:quarter|three\\s*months)"]
      signals: [has_dates]

  period_date_of_report:
    type: date
    description: Date of Report for 8-K / 8-K/A filings.
    extraction_hint: |
      For 8-K and 8-K/A filings only. Extract the date labeled "Date of
      Report (Date of earliest event reported)" on the cover page. This
      is the date of the triggering event the 8-K is disclosing, not the
      date the 8-K was filed with the SEC.

      Return null for any non-8-K form type.
    hints:
      look_in: [header]
      patterns: ["date\\s*of\\s*report", "date\\s*of\\s*earliest\\s*event"]
      signals: [has_dates]

  period_meeting_date:
    type: date
    description: Annual meeting date for DEF 14A proxy statements.
    extraction_hint: |
      For DEF 14A filings only. Extract the date of the annual meeting
      of stockholders the proxy statement is soliciting votes for. This
      date typically appears in a "NOTICE OF ANNUAL MEETING OF
      SHAREHOLDERS" section near the top of the proxy statement, often
      as a standalone line (e.g. "Wednesday, May 20, 2026") immediately
      after the notice heading, or inside a sentence like "the Annual
      Meeting... on Wednesday, May 20, 2026 at 10:00 a.m."

      Do NOT use:
        - The fiscal year end of the accompanying annual report
          ("for the year ended December 31, 2025")
        - The record date for stockholder voting ("record date of
          March 25, 2026")
        - Any filing / signature / mailing date
        - Any future-year annual meeting date (e.g. references to the
          2027 or 2028 annual meeting — only THIS proxy's meeting date)
      Only the date of the meeting itself is the answer.

      Return null for any non-DEF 14A form type.
    hints:
      # No look_in filter — the meeting-date chunk on a proxy statement
      # is typically titled "NOTICE OF ANNUAL MEETING" or similar and
      # does not match the cover-page header keyword list. prefer_contains
      # boosts the notice chunk above body chunks regardless of category.
      prefer_contains:
        - "notice of"
        - "annual meeting of shareholders"
        - "annual meeting of stockholders"
        - "to be held"
        - "meeting.*at"
      patterns: ["annual\\s*meeting", "notice\\s*of.*meeting", "to\\s*be\\s*held"]
      signals: [has_dates]
